version: "3.9"

services:
  # ── Tooler: XState-driven TDD loop ───────────────────────
  tooler:
    build:
      context: .
      dockerfile: Dockerfile.tooler
    volumes:
      - ./app:/workspace/app
      - ./plan:/workspace/plan
      - ./logs:/workspace/logs
      - ./tooler/src:/workspace/tooler/src
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5-coder}
      - APP_DIR=/workspace/app
      - PLAN_FILE=/workspace/plan/plan.md
      - MAX_PHASE_ATTEMPTS=${MAX_PHASE_ATTEMPTS:-3}
      - MAX_TASK_ATTEMPTS=${MAX_TASK_ATTEMPTS:-15}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      app-setup:
        condition: service_completed_successfully
    networks:
      - tooler-net
    restart: unless-stopped

  # ── One-shot: bootstrap app if empty ─────────────────────
  # Runs as root so it can write to bind-mounted dirs,
  # then chowns everything to 1000:1000 at the end.
  app-setup:
    image: node:20-slim
    working_dir: /workspace/app
    volumes:
      - ./app:/workspace/app
      - ./logs:/workspace/logs
      - ./scripts:/workspace/scripts
    entrypoint: ["bash", "-c", "bash /workspace/scripts/init-app.sh && chown -R 1000:1000 /workspace/app /workspace/logs"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tooler-net

  # ── Playwright for e2e (activate with --profile e2e) ─────
  playwright:
    image: mcr.microsoft.com/playwright:v1.48.0-noble
    working_dir: /workspace/app
    volumes:
      - ./app:/workspace/app
    command: ["npx", "playwright", "test"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - e2e
    networks:
      - tooler-net

networks:
  tooler-net:
    driver: bridge
