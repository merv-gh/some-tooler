version: "3.9"

services:
  # ── Tooler: XState-driven TDD loop ───────────────────────
  tooler:
    build:
      context: .
      dockerfile: Dockerfile.tooler
    volumes:
      - ./workspace:/workspace/projects
      - ./plan:/workspace/plan
      - ./logs:/workspace/logs
      - ./tooler/src:/workspace/tooler/src
      - ./.claude:/workspace/.claude:ro
      - tooler_node_modules:/workspace/tooler/node_modules
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5}
      - WORKSPACE_DIR=/workspace/projects
      - PLAN_FILE=/workspace/plan/plan.md
      - MAX_PHASE_ATTEMPTS=${MAX_PHASE_ATTEMPTS:-3}
      - MAX_TASK_ATTEMPTS=${MAX_TASK_ATTEMPTS:-15}
    ports:
      - "${UI_PORT:-7700}:7700"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - tooler-net
    restart: unless-stopped

  # ── Playwright for e2e (activate with --profile e2e) ─────
  playwright:
    image: mcr.microsoft.com/playwright:v1.48.0-noble
    working_dir: /workspace/projects
    volumes:
      - ./workspace:/workspace/projects
    command: ["npx", "playwright", "test"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - e2e
    networks:
      - tooler-net

volumes:
  tooler_node_modules:

networks:
  tooler-net:
    driver: bridge
